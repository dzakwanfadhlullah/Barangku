<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        background-color: #f7fbed; /* Using surface from theme */
      }
      /* Subtle Ambient Glow for the background */
      .ambient-glow {
        background: radial-gradient(circle at 50% 50%, rgba(213, 233, 193, 0.3) 0%, rgba(247, 251, 237, 0) 70%);
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex flex-col min-h-screen items-center justify-between overflow-hidden">
<!-- Top AppBar Suppressed per Shell Visibility & Relevance (The Filter) for Transactional/Focused screens -->
<!-- Main Content Canvas -->
<main class="relative flex-1 flex flex-col items-center justify-center w-full px-8 ambient-glow">
<!-- Branding Container -->
<div class="flex flex-col items-center text-center max-w-sm">
<!-- Logo Icon with Material Symbols -->
<div class="mb-8 w-20 h-20 flex items-center justify-center rounded-[24px] bg-primary text-on-primary shadow-xl shadow-primary/5">
<span class="material-symbols-outlined !text-4xl" data-icon="inventory_2">inventory_2</span>
</div>
<!-- Brand Name -->
<h1 class="text-4xl md:text-5xl font-extrabold text-on-surface tracking-tighter leading-none mb-3">
                Barangku
            </h1>
<!-- Tagline -->
<p class="text-secondary text-lg md:text-xl font-medium tracking-tight opacity-90">
                Inventori praktis untuk usaha sehari-hari
            </p>
</div>
<!-- Decorative Organic Layering -->
<div class="absolute inset-0 pointer-events-none -z-10">
<!-- Subtle tonal shifts instead of borders -->
<div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] rounded-full bg-secondary-fixed/20 blur-[100px]"></div>
<div class="absolute -bottom-[10%] -right-[10%] w-[40%] h-[40%] rounded-full bg-primary-fixed/20 blur-[100px]"></div>
</div>
</main>
<!-- Bottom Footer (Loading State) -->
<footer class="pb-16 flex flex-col items-center">
<!-- Loading Spinner / Indicator -->
<div class="mb-4">
<div class="w-6 h-6 border-2 border-primary/20 border-t-primary rounded-full animate-spin"></div>
</div>
<!-- Loading Text -->
<div class="flex items-center gap-2">
<span class="text-on-surface-variant font-medium text-sm tracking-wide">
                Menyiapkan data lokal...
            </span>
</div>
<!-- Semantic Mapping Check: 
             BottomNavBar is suppressed here as this is an onboarding/focused splash journey. 
             (Rule: Automatic Suppression for transactional/onboarding flows) 
        -->
</footer>
<!-- Image for Context/Atmosphere (Hidden but defined for system requirements) -->
<div class="sr-only">
<img alt="Aesthetic Background" data-alt="Soft ethereal background with smooth gradients of olive green and cream, evoking a sense of calm and professional organization" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB0Sdpl1MqqP_SSy0kxV-FSsXs0aUrvAEOUJh_EM_ee1gt2lCt_Cr4wK0_8p68UgM2-cUcnAa6xNfeBWU2Vcs66SG-kfIm0ohrfirR6tvsTpeSq4g440cja7TajWNLqLueIG19asOvzA8XPEz49tT1sJabUYuVoEWBLIw-FRZKfLkNNNTTviaP_hJLnMaVDe63450VlHz-KaM2EehZNXCBZ-j_j1_Nc6KQrmGjaPKj7mlURoxUEhkFy-OChdi0_F6QpmDXyuyKnfI4"/>
</div>
</body></html>
